<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Basics</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 30px;
        }

        .container {
            width: 400px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>TypeScript Student App</h1>

        <input type="text" id="name" placeholder="Enter Name">

        <input type="number" id="age" placeholder="Enter Age">

        <input type="text" id="course" placeholder="Enter Course">

        <button onclick="addStudent()">
            Add Student
        </button>

        <table>

            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
            </tr>

            <tbody id="studentTable"></tbody>

        </table>

    </div>

    <script src="app.js"></script>

</body>
</html>
