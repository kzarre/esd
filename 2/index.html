<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HTML Elements Practical</title>

    <style>

        body {
            font-family: Arial;
            margin: 20px;
            background-color: #f4f4f4;
        }

        header, footer {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        section {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        form input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
        }

    </style>

</head>
<body>



    <header>
        <h1>HTML Elements Practical</h1>
    </header>



    <section>

        <h2>Registration Form</h2>

        <form>

            <label>Name</label>
            <input type="text" placeholder="Enter name">

            <label>Email</label>
            <input type="email" placeholder="Enter email">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <button type="submit">Submit</button>

        </form>

    </section>



    <section>

        <h2>Student Table</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Rahul</td>
                <td>BCA</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Anjali</td>
                <td>BTech</td>
            </tr>

        </table>

    </section>



    <section>

        <h2>Image</h2>

        <img src="https://via.placeholder.com/300"
             alt="Sample Image">

        <h2 class="mt-3">Audio</h2>

        <audio controls>
            <source src="sample.mp3" type="audio/mp3">
        </audio>

        <h2>Video</h2>

        <video width="400" controls>
            <source src="sample.mp4" type="video/mp4">
        </video>

    </section>

    <footer>
        <p>College Practical Example</p>
    </footer>

</body>
</html>
